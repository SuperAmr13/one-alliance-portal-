<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONe Alliance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <header class="bg-slate-900 border-b border-slate-800 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-amber-500">ONe Portal</h1>
            <select id="langSelect" onchange="changeLanguage()" class="bg-slate-800 text-xs p-2 rounded text-white">
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="tr">Türkçe</option>
                <option value="id">Bahasa Indonesia</option>
            </select>
        </div>
    </header>

    <main class="flex justify-center p-4">
        <div id="authCard" class="w-full max-w-md bg-slate-900 p-6 rounded-xl border border-slate-800">
            <!-- التبويبات -->
            <div class="flex gap-4 mb-6 border-b border-slate-800 pb-2">
                <button id="btnTabLogin" onclick="showTab('login')" class="text-amber-500 font-bold">Login</button>
                <button id="btnTabSignup" onclick="showTab('signup')" class="text-slate-400">Sign Up</button>
            </div>

            <!-- فورم الدخول -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <input type="number" id="lId" placeholder="Player ID" class="w-full bg-slate-950 p-3 rounded mb-3 border border-slate-800">
                <input type="password" id="lPass" placeholder="Password" class="w-full bg-slate-950 p-3 rounded mb-3 border border-slate-800">
                <button type="submit" id="btnLogin" class="w-full bg-amber-600 p-3 rounded font-bold">Login</button>
            </form>

            <!-- فورم التسجيل -->
            <form id="signupForm" onsubmit="handleSignup(event)" class="hidden">
                <input type="number" id="sId" placeholder="Player ID" required class="w-full bg-slate-950 p-3 rounded mb-3 border border-slate-800">
                <input type="text" id="sName" placeholder="In-Game Name" required class="w-full bg-slate-950 p-3 rounded mb-3 border border-slate-800">
                <input type="password" id="sPass" placeholder="Password" required class="w-full bg-slate-950 p-3 rounded mb-3 border border-slate-800">
                <button type="submit" id="btnSignup" class="w-full bg-emerald-600 p-3 rounded font-bold">Sign Up</button>
            </form>
        </div>
    </main>

    <script>
        const supabase = supabase.createClient("https://ldgeerpyyjpfsjijgjif.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkZ2VlcnB5eWpwZnNqaWpnamlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNDcwNzYsImV4cCI6MjA5OTYyMzA3Nn0.UrdUEQOSTXwC3NhZcQtKbKmecpUbeWlwuF4bTPz8sI8");

        const translations = {
            en: { login: "Login", signup: "Sign Up", btnLogin: "Login", btnSignup: "Sign Up" },
            ar: { login: "دخول", signup: "تسجيل", btnLogin: "دخول", btnSignup: "تسجيل" },
            tr: { login: "Giriş", signup: "Kayıt", btnLogin: "Giriş", btnSignup: "Kayıt" },
            id: { login: "Masuk", signup: "Daftar", btnLogin: "Masuk", btnSignup: "Daftar" }
        };

        function changeLanguage() {
            const lang = document.getElementById('langSelect').value;
            const t = translations[lang];
            document.getElementById('btnTabLogin').innerText = t.login;
            document.getElementById('btnTabSignup').innerText = t.signup;
            document.getElementById('btnLogin').innerText = t.btnLogin;
            document.getElementById('btnSignup').innerText = t.btnSignup;
            document.getElementById('htmlTag').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        }

        function showTab(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
            document.getElementById('btnTabLogin').className = (tab === 'login') ? "text-amber-500 font-bold" : "text-slate-400";
            document.getElementById('btnTabSignup').className = (tab === 'signup') ? "text-amber-500 font-bold" : "text-slate-400";
        }

        async function handleSignup(e) {
            e.preventDefault();
            console.log("Starting Signup...");
            const { data, error } = await supabase.from('profiles').insert([{
                player_id: document.getElementById('sId').value,
                in_game_name: document.getElementById('sName').value,
                password: document.getElementById('sPass').value,
                status: 'pending',
                role: 'member'
            }]);
            
            if (error) {
                console.error("Supabase Error:", error);
                alert("Error: " + error.message);
            } else {
                alert("Success! Pending approval.");
            }
        }

        async function handleLogin(e) { e.preventDefault(); alert("Login function here"); }
    </script>
</body>
</html>
