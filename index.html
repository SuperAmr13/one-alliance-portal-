<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ONe Alliance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">

    <!-- شاشة الدخول -->
    <div id="loginSection" class="w-full max-w-sm bg-slate-900 p-8 rounded-2xl shadow-xl">
        <h2 class="text-2xl font-bold text-center mb-6 text-amber-500">تسجيل الدخول</h2>
        <input type="number" id="idInput" class="w-full bg-slate-800 p-3 rounded mb-4 text-right" placeholder="معرّف اللاعب">
        <input type="password" id="passInput" class="w-full bg-slate-800 p-3 rounded mb-4 text-right" placeholder="كلمة المرور">
        <button onclick="login()" class="w-full bg-amber-600 py-3 rounded font-bold hover:bg-amber-500">دخول</button>
    </div>

    <!-- لوحة التحكم -->
    <div id="dashboardSection" class="hidden w-full max-w-2xl bg-slate-900 p-8 rounded-2xl shadow-xl">
        <h2 id="welcomeText" class="text-2xl font-bold text-center mb-4">أهلاً بك</h2>
        <p id="roleDisplay" class="text-center text-slate-400 mb-6"></p>
        <button onclick="location.reload()" class="bg-red-600 px-4 py-2 rounded text-sm">خروج</button>
    </div>

    <script>
        const SUPABASE_URL = "https://ldgeerpyyjpfsjijgjif.supabase.co"; // تأكد من الرابط
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // تأكد من الـ Key بتاعك
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function login() {
            const playerId = document.getElementById('idInput').value;
            const password = document.getElementById('passInput').value;

            // 1. الدخول كمالك (بدون بحث في القاعدة)
            if (playerId === "1200307497001771" && password === "132005") {
                showDashboard("القائد MR AMR", "رتبتك: صاحب التحالف (R5) 👑");
                return;
            }

            // 2. الدخول كعضو عادي
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .eq('player_id', playerId)
                .single();

            if (error || !data || data.password !== password) {
                alert("بيانات غير صحيحة!");
                return;
            }

            if (data.status !== 'approved') {
                alert("حسابك معلق بانتظار الموافقة");
                return;
            }

            showDashboard(data.in_game_name, "رتبتك: " + data.role);
        }

        function showDashboard(name, role) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('welcomeText').innerText = "أهلاً بك يا " + name;
            document.getElementById('roleDisplay').innerText = role;
        }
    </script>
</body>
</html>
