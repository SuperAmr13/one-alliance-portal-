<!DOCTYPE html>
<html lang="en" dir="ltr" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONe Alliance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-500 to-yellow-300">ONe</span>
                <span class="text-xs bg-amber-500/10 border border-amber-500/30 text-amber-400 px-2.5 py-0.5 rounded-full font-bold">Portal</span>
            </div>
            <div class="flex items-center gap-3">
                <!-- قائمة اختيار اللغات الأربعة -->
                <select onchange="changeLanguage(this.value)" id="langSelect" class="text-xs bg-slate-800 border border-slate-700 text-slate-300 px-2.5 py-1.5 rounded-lg hover:bg-slate-700 transition-all font-bold outline-none">
                    <option value="en" selected>English</option>
                    <option value="ar">العربية</option>
                    <option value="tr">Türkçe</option>
                    <option value="id">Bahasa Indonesia</option>
                </select>
                <button id="logoutBtn" onclick="handleLogout()" class="hidden text-xs bg-red-500/10 border border-red-500/30 text-red-400 px-3 py-1.5 rounded-lg font-bold hover:bg-red-500/20 transition-all">Logout</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        
        <!-- Auth Card -->
        <div id="authCard" class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl">
            <div class="flex border-b border-slate-800 mb-6">
                <button id="tabLogin" onclick="switchAuthTab('login')" class="flex-1 pb-3 text-sm font-bold border-b-2 border-amber-500 text-amber-500 transition-all">Login</button>
                <button id="tabSignup" onclick="switchAuthTab('signup')" class="flex-1 pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label id="lblLoginId" class="block text-xs font-semibold text-slate-400 mb-1.5 text-left">Player ID</label>
                    <input type="number" id="loginId" required class="w-full bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-lg px-4 py-2.5 text-sm text-left outline-none font-mono" placeholder="12345678">
                </div>
                <div>
                    <label id="lblLoginPass" class="block text-xs font-semibold text-slate-400 mb-1.5 text-left">Password</label>
                    <input type="password" id="loginPass" required class="w-full bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-lg px-4 py-2.5 text-sm text-left outline-none" placeholder="••••••••">
                </div>
                <button type="submit" id="btnLoginSubmit" class="w-full bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-bold py-3 rounded-lg text-sm transition-all shadow-lg mt-6">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" onsubmit="handleSignup(event)" class="space-y-4 hidden">
                <div>
                    <label id="lblSignupId" class="block text-xs font-semibold text-slate-400 mb-1.5 text-left">Player ID</label>
                    <input type="number" id="signupId" required class="w-full bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-lg px-4 py-2.5 text-sm text-left outline-none font-mono">
                </div>
                <div>
                    <label id="lblSignupName" class="block text-xs font-semibold text-slate-400 mb-1.5 text-left">In-Game Name</label>
                    <input type="text" id="signupName" required class="w-full bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-lg px-4 py-2.5 text-sm text-left outline-none">
                </div>
                <div>
                    <label id="lblSignupPass" class="block text-xs font-semibold text-slate-400 mb-1.5 text-left">Password</label>
                    <input type="password" id="signupPass" required class="w-full bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-lg px-4 py-2.5 text-sm text-left outline-none">
                </div>
                <button type="submit" id="btnSignupSubmit" class="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-slate-950 font-bold py-3 rounded-lg text-sm transition-all shadow-lg mt-6">Submit Registration</button>
            </form>

            <!-- Pending Message -->
            <div id="pendingMessage" class="hidden text-center space-y-4 py-4">
                <div class="mx-auto w-12 h-12 bg-amber-500/10 border border-amber-500/30 text-amber-400 rounded-full flex items-center justify-center text-xl font-bold">⏱️</div>
                <h3 id="pendingTitle" class="text-lg font-bold text-amber-500">Request Submitted Successfully!</h3>
                <p id="pendingText" class="text-xs text-slate-400 leading-relaxed">Please wait for Commander (MR AMR) to approve your account.</p>
                <button id="btnReturnLogin" onclick="switchAuthTab('login')" class="text-xs text-amber-500 underline hover:text-amber-400 block mx-auto mt-4 font-bold">Back to Login</button>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboardSection" class="hidden w-full max-w-4xl bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
            <div class="text-center mb-8">
                <h2 id="welcomeHeader" class="text-2xl font-bold text-amber-500">Welcome to ONe Alliance Portal</h2>
                <p class="text-sm text-slate-400 mt-2 font-bold" id="roleStatus">Your Current Rank: Member</p>
            </div>
            
            <!-- Admin Panel (R5 Only) -->
            <div id="adminPanel" class="hidden bg-slate-950 border border-amber-500/20 p-5 rounded-xl mb-6">
                <div class="flex items-center justify-between border-b border-slate-800 pb-3 mb-4">
                    <h3 id="adminTitle" class="font-extrabold text-amber-500 text-base">🛠️ Alliance Management Panel</h3>
                    <span class="text-xs bg-amber-500/10 text-amber-400 px-2 py-1 rounded-full font-bold" id="pendingCount">0 Requests</span>
                </div>
                <div id="pendingList" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 border-t border-slate-900 text-center p-4 text-xs text-slate-600">
        © 2026 ONe Alliance Portal. Owner: MR AMR.
    </footer>

    <script>

        // ترجمة اللغات الأربعة بالكامل
        const translations = {

        function changeLanguage(lang) {
            currentLang = lang;
            const htmlTag = document.getElementById('htmlTag');
            
            if (currentLang === 'ar') {
                htmlTag.setAttribute('dir', 'rtl');
                htmlTag.setAttribute('lang', 'ar');
            } else {
                htmlTag.setAttribute('dir', 'ltr');
                htmlTag.setAttribute('lang', currentLang);
            }
            applyTranslations();
        }

        // دالة مساعدة لتشغيل الترجمة بمجرد تغيير الخيار
        function toggleLanguage() {
            // غير مستخدمة مباشرة الآن لأننا نعتمد على القائمة المنسدلة changeLanguage
        }

        function applyTranslations() {
            const t = translations[currentLang];
            document.getElementById('tabLogin').innerText = t.tabLogin;
            document.getElementById('tabSignup').innerText = t.tabSignup;
            document.getElementById('lblLoginId').innerText = t.lblLoginId;
            document.getElementById('lblLoginPass').innerText = t.lblLoginPass;
            document.getElementById('btnLoginSubmit').innerText = t.btnLoginSubmit;
            document.getElementById('lblSignupId').innerText = t.lblSignupId;
            document.getElementById('lblSignupName').innerText = t.lblSignupName;
            document.getElementById('lblSignupPass').innerText = t.lblSignupPass;
            document.getElementById('btnSignupSubmit').innerText = t.btnSignupSubmit;
            document.getElementById('pendingTitle').innerText = t.pendingTitle;
            document.getElementById('pendingText').innerText = t.pendingText;
            document.getElementById('btnReturnLogin').innerText = t.btnReturnLogin;
            document.getElementById('welcomeHeader').innerText = t.welcomeHeader;
            document.getElementById('adminTitle').innerText = t.adminTitle;
            document.getElementById('logoutBtn').innerText = t.logoutBtn;
            
            // محاذاة النص والـ Labels بناءً على اللغة المحددة
            const textDir = currentLang === 'ar' ? 'text-right' : 'text-left';
            const removeDir = currentLang === 'ar' ? 'text-left' : 'text-right';
            
            const inputs = ['loginId', 'loginPass', 'signupId', 'signupName', 'signupPass'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.remove(removeDir);
                    el.classList.add(textDir);
                }
            });

            const labels = ['lblLoginId', 'lblLoginPass', 'lblSignupId', 'lblSignupName', 'lblSignupPass'];
            labels.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.remove(removeDir);
                    el.classList.add(textDir);
                }
            });
            
            if (currentUser) {
                updateRoleDisplay();
                if (String(currentUser.player_id) === OWNER_ID || currentUser.role === 'r5') {
                    loadPendingUsers();
                }
            }
        }

        function updateRoleDisplay() {
            const t = translations[currentLang];
            if (String(currentUser.player_id) === OWNER_ID || currentUser.role === 'r5') {
                document.getElementById('roleStatus').innerText = t.roleStatus + t.ownerRoleText;
            } else {
                document.getElementById('roleStatus').innerText = t.roleStatus + (currentUser.role === 'r4' ? 'R4' : t.memberRoleText);
            }
        }

        function switchAuthTab(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
            document.getElementById('pendingMessage').classList.add('hidden');
            
            if (tab === 'login') {
                document.getElementById('tabLogin').className = "flex-1 pb-3 text-sm font-bold border-b-2 border-amber-500 text-amber-500 transition-all";
                document.getElementById('tabSignup').className = "flex-1 pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all";
            } else {
                document.getElementById('tabSignup').className = "flex-1 pb-3 text-sm font-bold border-b-2 border-amber-500 text-amber-500 transition-all";
                document.getElementById('tabLogin').className = "flex-1 pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all";
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const playerId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPass').value;
            const t = translations[currentLang];

            const { data, error } = await supabase.from('profiles').select('*').eq('player_id', playerId).maybeSingle();
            
            if (error || !data || data.password !== password) {
                alert(t.msgError);
                return;
            }

            if (data.status === 'pending') {
                alert(t.msgPending);
                return;
            }

            currentUser = data;

            document.getElementById('authCard').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');

            updateRoleDisplay();

            if (String(currentUser.player_id) === OWNER_ID || currentUser.role === 'r5') {
                document.getElementById('adminPanel').classList.remove('hidden');
                loadPendingUsers();
            } else {
                document.getElementById('adminPanel').classList.add('hidden');
            }
        }

        async function loadPendingUsers() {
            const { data } = await supabase.from('profiles').select('*').eq('status', 'pending');
            const pendingList = document.getElementById('pendingList');
            const t = translations[currentLang];
            
            document.getElementById('pendingCount').innerText = `${data ? data.length : 0} ${t.textPendingCount}`;
            
            if (data && data.length > 0) {
                pendingList.innerHTML = data.map(user => `
                    <div class="flex justify-between items-center bg-slate-900 p-3 rounded-lg border border-slate-800">
                        <span class="text-sm font-bold text-white">${user.in_game_name}</span>
                        <button onclick="approveUser('${user.player_id}')" class="bg-emerald-600 text-xs text-black font-bold px-3 py-1.5 rounded hover:bg-emerald-500 transition-all">${t.textApproveBtn}</button>
                    </div>
                `).join('');
            } else {
                pendingList.innerHTML = `<p class="text-xs text-slate-500 text-center py-2">${t.msgNoPending}</p>`;
            }
        }

        async function approveUser(id) {
            const t = translations[currentLang];
            await supabase.from('profiles').update({ status: 'approved' }).eq('player_id', id);
            alert(t.msgApproveSuccess);
            loadPendingUsers();
        }

        function handleLogout() { location.reload(); }

        async function handleSignup(event) {
            event.preventDefault();
            const playerId = document.getElementById('signupId').value.trim();
            const { error } = await supabase.from('profiles').insert([{ 
                player_id: playerId, 
                in_game_name: document.getElementById('signupName').value, 
                password: document.getElementById('signupPass').value, 
                status: 'pending', 
                role: 'member' 
            }]);
            
            if (error) {
                alert(currentLang === 'ar' ? 'خطأ في التسجيل، قد يكون الحساب مسجل بالفعل.' : 'Registration error. Account might already exist.');
            } else {
                document.getElementById('signupForm').classList.add('hidden');
                document.getElementById('pendingMessage').classList.remove('hidden');
            }
        }
    </script>
