<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONe Alliance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-500 to-yellow-300">ONe</span>
                <span class="text-xs bg-amber-500/10 border border-amber-500/30 text-amber-400 px-2.5 py-0.5 rounded-full font-bold">Portal</span>
            </div>
            <div class="flex items-center gap-3">
                <!-- زر تغيير اللغة -->
                <button onclick="toggleLanguage()" id="langBtn" class="text-xs bg-slate-800 border border-slate-700 text-slate-300 px-3 py-1.5 rounded-lg hover:bg-slate-700 transition-all font-bold">English</button>
                <button id="logoutBtn" onclick="handleLogout()" class="hidden text-xs bg-red-500/10 border border-red-500/30 text-red-400 px-3 py-1.5 rounded-lg font-bold hover:bg-red-500/20 transition-all">تسجيل الخروج</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-4">
        
        <!-- كارت الدخول والتسجيل -->
        <div id="authCard" class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl">
            <div class="flex border-b border-slate-800 mb-6">
                <button id="tabLogin" onclick="switchAuthTab('login')" class="flex-1 pb-3 text-sm font-bold border-b-2 border-amber-500 text-amber-500 transition-all">تسجيل الدخول</button>
                <button id="tabSignup" onclick="switchAuthTab('signup')" class="flex-1 pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all">إنشاء حساب جديد</button>
            </div>

            <!-- نموذج تسجيل الدخول -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label id="lblLoginId" class="block text-xs font-semibold text-slate-400 mb-1.5 text-right">معرّف اللاعب (Player ID)</label>
                    <input type="number" id="loginId" required class="w-full bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-lg px-4 py-2.5 text-sm text-right outline-none font-mono" placeholder="">
                </div>
                <div>
                    <label id="lblLoginPass" class="block text-xs font-semibold text-slate-400 mb-1.5 text-right">كلمة المرور (Password)</label>
                    <input type="password" id="loginPass" required class="w-full bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-lg px-4 py-2.5 text-sm text-right outline-none" placeholder="••••••••">
                </div>
                <button type="submit" id="btnLoginSubmit" class="w-full bg-gradient-to-r from-amber-600 to-amber-500 hover:from-amber-500 hover:to-amber-400 text-slate-950 font-bold py-3 rounded-lg text-sm transition-all shadow-lg mt-6">دخول</button>
            </form>

            <!-- نموذج إنشاء حساب -->
            <form id="signupForm" onsubmit="handleSignup(event)" class="space-y-4 hidden">
                <div>
                    <label id="lblSignupId" class="block text-xs font-semibold text-slate-400 mb-1.5 text-right">معرّف اللاعب (Player ID)</label>
                    <input type="number" id="signupId" required class="w-full bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-lg px-4 py-2.5 text-sm text-right outline-none font-mono">
                </div>
                <div>
                    <label id="lblSignupName" class="block text-xs font-semibold text-slate-400 mb-1.5 text-right">الاسم داخل اللعبة (In-Game Name)</label>
                    <input type="text" id="signupName" required class="w-full bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-lg px-4 py-2.5 text-sm text-right outline-none">
                </div>
                <div>
                    <label id="lblSignupPass" class="block text-xs font-semibold text-slate-400 mb-1.5 text-right">كلمة المرور (Password)</label>
                    <input type="password" id="signupPass" required class="w-full bg-slate-950 border border-slate-800 focus:border-amber-500 rounded-lg px-4 py-2.5 text-sm text-right outline-none">
                </div>
                <button type="submit" id="btnSignupSubmit" class="w-full bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-slate-950 font-bold py-3 rounded-lg text-sm transition-all shadow-lg mt-6">إرسال طلب التسجيل</button>
            </form>

            <!-- رسالة التعليق -->
            <div id="pendingMessage" class="hidden text-center space-y-4 py-4">
                <div class="mx-auto w-12 h-12 bg-amber-500/10 border border-amber-500/30 text-amber-400 rounded-full flex items-center justify-center text-xl font-bold">⏱️</div>
                <h3 id="pendingTitle" class="text-lg font-bold text-amber-500">تم إرسال طلبك بنجاح!</h3>
                <p id="pendingText" class="text-xs text-slate-400 leading-relaxed">يرجى انتظار قيام القائد (MR AMR) بتفعيل حسابك.</p>
                <button id="btnReturnLogin" onclick="switchAuthTab('login')" class="text-xs text-amber-500 underline hover:text-amber-400 block mx-auto mt-4">العودة لتسجيل الدخول</button>
            </div>
        </div>

        <!-- لوحة التحكم للـ R5 والأعضاء -->
        <div id="dashboardSection" class="hidden w-full max-w-4xl bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
            <div class="text-center mb-8">
                <h2 id="welcomeHeader" class="text-2xl font-bold text-amber-500">أهلاً بك في بوابة تحالف ONe</h2>
                <p class="text-xs text-slate-400 mt-2" id="roleStatus">رتبتك الحالية: عضو</p>
            </div>
            
            <!-- لوحة المالك والـ R5 (تظهر فقط لك) -->
            <div id="adminPanel" class="hidden bg-slate-950 border border-amber-500/20 p-5 rounded-xl mb-6">
                <div class="flex items-center justify-between border-b border-slate-800 pb-3 mb-4">
                    <h3 id="adminTitle" class="font-extrabold text-amber-500 text-base">🛠️ لوحة إدارة التحالف</h3>
                    <span class="text-xs bg-amber-500/10 text-amber-400 px-2 py-1 rounded-full font-bold" id="pendingCount">0 طلبات</span>
                </div>
                <div id="pendingList" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-950 border-t border-slate-900 text-center p-4 text-xs text-slate-600">
        © 2026 ONe Alliance Portal. Owner: MR AMR.
    </footer>

    <script>
        const SUPABASE_URL = "https://ldgeerpyyjpfsjijgjif.supabase.co";
        const SUPABASE_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxkZ2VlcnB5eWpwZnNqaWpnamlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwNDcwNzYsImV4cCI6MjA5OTYyMzA3Nn0.UrdUEQOSTXwC3NhZcQtKbKmecpUbeWlwuF4bTPz8sI8";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const OWNER_ID = "1200307497001771";
        const OWNER_PASSWORD = "132005";
        let currentUser = null;
        let currentLang = 'ar';

        const translations = {
            ar: {
                tabLogin: "تسجيل الدخول",
                tabSignup: "إنشاء حساب جديد",
                lblLoginId: "معرّف اللاعب (Player ID)",
                lblLoginPass: "كلمة المرور (Password)",
                btnLoginSubmit: "دخول",
                lblSignupId: "معرّف اللاعب (Player ID)",
                lblSignupName: "الاسم داخل اللعبة (In-Game Name)",
                lblSignupPass: "كلمة المرور (Password)",
                btnSignupSubmit: "إرسال طلب التسجيل",
                pendingTitle: "تم إرسال طلبك بنجاح!",
                pendingText: "يرجى انتظار قيام القائد (MR AMR) بتفعيل حسابك.",
                btnReturnLogin: "العودة لتسجيل الدخول",
                welcomeHeader: "أهلاً بك في بوابة تحالف ONe",
                roleStatus: "رتبتك الحالية: ",
                adminTitle: "🛠️ لوحة إدارة التحالف",
                logoutBtn: "تسجيل الخروج",
                msgPending: "حسابك معلق بانتظار الموافقة!",
                msgError: "بيانات الدخول غير صحيحة!",
                msgNoPending: "لا توجد طلبات معلقة حالياً.",
                msgApproveSuccess: "تم تفعيل الحساب بنجاح!",
                ownerRoleText: "صاحب البرنامج والتحالف 👑"
            },
            en: {
                tabLogin: "Login",
                tabSignup: "Sign Up",
                lblLoginId: "Player ID",
                lblLoginPass: "Password",
                btnLoginSubmit: "Login",
                lblSignupId: "Player ID",
                lblSignupName: "In-Game Name",
                lblSignupPass: "Password",
                btnSignupSubmit: "Submit Registration",
                pendingTitle: "Request Submitted Successfully!",
                pendingText: "Please wait for Commander (MR AMR) to approve your account.",
                btnReturnLogin: "Back to Login",
                welcomeHeader: "Welcome to ONe Alliance Portal",
                roleStatus: "Your Current Rank: ",
                adminTitle: "🛠️ Alliance Management Panel",
                logoutBtn: "Logout",
                msgPending: "Your account is pending approval!",
                msgError: "Incorrect login details!",
                msgNoPending: "No pending requests at the moment.",
                msgApproveSuccess: "Account approved successfully!",
                ownerRoleText: "App Owner & Leader 👑"
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            const htmlTag = document.getElementById('htmlTag');
            
            if (currentLang === 'en') {
                htmlTag.setAttribute('dir', 'ltr');
                htmlTag.setAttribute('lang', 'en');
                document.getElementById('langBtn').innerText = 'العربية';
            } else {
                htmlTag.setAttribute('dir', 'rtl');
                htmlTag.setAttribute('lang', 'ar');
                document.getElementById('langBtn').innerText = 'English';
            }
            applyTranslations();
        }

        function applyTranslations() {
            const t = translations[currentLang];
            document.getElementById('tabLogin').innerText = t.tabLogin;
            document.getElementById('tabSignup').innerText = t.tabSignup;
            document.getElementById('lblLoginId').innerText = t.lblLoginId;
            document.getElementById('lblLoginPass').innerText = t.lblLoginPass;
            document.getElementById('btnLoginSubmit').innerText = t.btnLoginSubmit;
            document.getElementById('lblSignupId').innerText = t.lblSignupId;
            document.getElementById('lblSignupName').innerText = t.lblSignupName;
            document.getElementById('lblSignupPass').innerText = t.lblSignupPass;
            document.getElementById('btnSignupSubmit').innerText = t.btnSignupSubmit;
            document.getElementById('pendingTitle').innerText = t.pendingTitle;
            document.getElementById('pendingText').innerText = t.pendingText;
            document.getElementById('btnReturnLogin').innerText = t.btnReturnLogin;
            document.getElementById('welcomeHeader').innerText = t.welcomeHeader;
            document.getElementById('adminTitle').innerText = t.adminTitle;
            document.getElementById('logoutBtn').innerText = t.logoutBtn;
            
            if (currentUser) {
                updateRoleDisplay();
            }
        }

        function updateRoleDisplay() {
            const t = translations[currentLang];
            if (String(currentUser.player_id) === OWNER_ID) {
                document.getElementById('roleStatus').innerText = t.roleStatus + t.ownerRoleText;
            } else {
                document.getElementById('roleStatus').innerText = t.roleStatus + (currentUser.role === 'r4' ? 'R4' : 'Member');
            }
        }

        function switchAuthTab(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
            document.getElementById('pendingMessage').classList.add('hidden');
            
            const t = translations[currentLang];
            if (tab === 'login') {
                document.getElementById('tabLogin').className = "flex-1 pb-3 text-sm font-bold border-b-2 border-amber-500 text-amber-500 transition-all";
                document.getElementById('tabSignup').className = "flex-1 pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all";
            } else {
                document.getElementById('tabSignup').className = "flex-1 pb-3 text-sm font-bold border-b-2 border-amber-500 text-amber-500 transition-all";
                document.getElementById('tabLogin').className = "flex-1 pb-3 text-sm font-bold border-b-2 border-transparent text-slate-400 hover:text-slate-200 transition-all";
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            const playerId = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPass').value;
            const t = translations[currentLang];

            // الدخول المباشر للمالك
            if (playerId === OWNER_ID) {
                if (password !== OWNER_PASSWORD) {
                    alert(t.msgError);
                    return;
                }
                let { data: ownerData } = await supabase.from('profiles').select('*').eq('player_id', OWNER_ID).maybeSingle();
                if (!ownerData) {
                    const { data: newOwner } = await supabase.from('profiles').insert([{ player_id: OWNER_ID, in_game_name: 'ONe | MR AMR', password: OWNER_PASSWORD, status: 'approved', role: 'r5' }]).select().single();
                    ownerData = newOwner;
                }
                currentUser = ownerData;
            } else {
                const { data, error } = await supabase.from('profiles').select('*').eq('player_id', playerId).maybeSingle();
                if (error || !data || data.password !== password) {
                    alert(t.msgError);
                    return;
                }
                if (data.status === 'pending') {
                    alert(t.msgPending);
                    return;
                }
                currentUser = data;
            }

            document.getElementById('authCard').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');

            updateRoleDisplay();

            if (String(currentUser.player_id) === OWNER_ID || currentUser.role === 'r5') {
                document.getElementById('adminPanel').classList.remove('hidden');
                loadPendingUsers();
            } else {
                document.getElementById('adminPanel').classList.add('hidden');
            }
        }

        async function loadPendingUsers() {
            const { data } = await supabase.from('profiles').select('*').eq('status', 'pending');
            const pendingList = document.getElementById('pendingList');
            const t = translations[currentLang];
            
            document.getElementById('pendingCount').innerText = `${data ? data.length : 0} ${currentLang === 'ar' ? 'طلبات' : 'Requests'}`;
            
            if (data && data.length > 0) {
                pendingList.innerHTML = data.map(user => `
                    <div class="flex justify-between items-center bg-slate-900 p-3 rounded-lg border border-slate-800">
                        <span class="text-sm font-bold text-white">${user.in_game_name}</span>
                        <button onclick="approveUser('${user.player_id}')" class="bg-emerald-600 text-xs text-black font-bold px-3 py-1 rounded hover:bg-emerald-500 transition-all">${currentLang === 'ar' ? 'تفعيل' : 'Approve'}</button>
                    </div>
                `).join('');
            } else {
                pendingList.innerHTML = `<p class="text-xs text-slate-500 text-center py-2">${t.msgNoPending}</p>`;
            }
        }

        async function approveUser(id) {
            const t = translations[currentLang];
            await supabase.from('profiles').update({ status: 'approved' }).eq('player_id', id);
            alert(t.msgApproveSuccess);
            loadPendingUsers();
        }

        function handleLogout() { location.reload(); }

        async function handleSignup(event) {
            event.preventDefault();
            const playerId = document.getElementById('signupId').value.trim();
            const { error } = await supabase.from('profiles').insert([{ 
                player_id: playerId, 
                in_game_name: document.getElementById('signupName').value, 
                password: document.getElementById('signupPass').value, 
                status: 'pending', 
                role: 'member' 
            }]);
            
            if (error) {
                alert(currentLang === 'ar' ? 'خطأ في التسجيل، قد يكون الحساب مسجل بالفعل.' : 'Registration error. Account might already exist.');
            } else {
                document.getElementById('signupForm').classList.add('hidden');
                document.getElementById('pendingMessage').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
